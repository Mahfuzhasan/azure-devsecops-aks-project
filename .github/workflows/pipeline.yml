name: CI/CD Pipeline - AKS DevSecOps

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        az acr login --name acrdevsecops12345

    - name: Build Docker Image
      run: |
        docker build -t acrdevsecops12345.azurecr.io/fastapi-app:${{ github.sha }} ./app

    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: acrdevsecops12345.azurecr.io/fastapi-app:${{ github.sha }}
        format: table
        exit-code: 0
        severity: CRITICAL,HIGH

    - name: Push Image
      run: |
        docker push acrdevsecops12345.azurecr.io/fastapi-app:${{ github.sha }}

    - name: Get AKS Credentials
      run: |
        az aks get-credentials --resource-group rg-devsecops-project --name aks-devsecops --overwrite-existing

    - name: Deploy to AKS
      run: |
        kubectl set image deployment/fastapi-deployment \
        fastapi-container=acrdevsecops12345.azurecr.io/fastapi-app:${{ github.sha }}